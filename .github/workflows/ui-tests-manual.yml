name: Playwright UI Tests Manual

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser project to run'
        required: true
        default: 'Google Chrome'
        type: choice
        options:
          - Google Chrome
          - Firefox
          - all

jobs:
  ui-tests:
    name: Run UI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome firefox

      - name: Run UI tests on selected browser
        if: ${{ github.event.inputs.browser != 'all' }}
        run: npm run test:ui -- --project="${{ github.event.inputs.browser }}"

      - name: Run UI tests on all browsers
        if: ${{ github.event.inputs.browser == 'all' }}
        run: npm run test:ui

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ui-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ui-test-artifacts
          path: test-results/
          if-no-files-found: ignore